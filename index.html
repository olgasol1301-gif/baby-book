<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Baby Book</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #f6f3ef;
      font-family: Georgia, serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .book {
      width: 100%;
      max-width: 420px;
      padding: 16px;
      box-sizing: border-box;
    }

    .cover {
      width: 100%;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      display: block;
    }

    .hint {
      text-align: center;
      margin-top: 12px;
      font-size: 14px;
      color: #777;
    }
  </style>
</head>

<body>

  <div class="book">
    <img src="images/cover.jpg" alt="Обложка книги" class="cover">
    <div class="hint">Листай дальше →</div>
  </div>

</body>
</html>
