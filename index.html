<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Колобок — интерактивная книга</title>

  <style>
    body {
      margin: 0;
      background: #f6f1e7;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: serif;
    }

    .book {
      position: relative;
      width: 80%;
      max-width: 800px;
      aspect-ratio: 3 / 4;
      background: white;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      overflow: hidden;
    }

    .page {
      width: 100%;
      height: 100%;
      display: none;
    }

    .page img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .page.active {
      display: block;
    }

    .nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0,0,0,0.5);
      color: white;
      border: none;
      font-size: 30px;
      padding: 10px 15px;
      cursor: pointer;
      z-index: 10;
    }

    .nav.left {
      left: 10px;
    }

    .nav.right {
      right: 10px;
    }
  </style>
</head>

<body>

<div class="book">
  <button class="nav left" onclick="prevPage()">←</button>
  <button class="nav right" onclick="nextPage()">→</button>

  <!-- СТРАНИЦЫ -->
  <div class="page active"><img src="images/cover.jpg"></div>
  <div class="page"><img src="images/01-baking-request.jpg"></div>
  <div class="page"><img src="images/02-baking.jpg"></div>
  <div class="page"><img src="images/03-escape.jpg"></div>
  <div class="page"><img src="images/04-hare.jpg"></div>
  <div class="page"><img src="images/05-hare-song.jpg"></div>
  <div class="page"><img src="images/06-wolf.jpg"></div>
  <div class="page"><img src="images/07-wolf-song.jpg"></div>
  <div class="page"><img src="images/08-bear.jpg"></div>
  <div class="page"><img src="images/09-bear-song.jpg"></div>
  <div class="page"><img src="images/10-fox.jpg"></div>
  <div class="page"><img src="images/11-fox-trick.jpg"></div>
  <div class="page"><img src="images/12-ending.jpg"></div>
</div>

<script>
  const pages = document.querySelectorAll('.page');
  let current = 0;

  function showPage(index) {
    pages[current].classList.remove('active');
    current = index;
    pages[current].classList.add('active');
  }

  function nextPage() {
    if (current < pages.length - 1) {
      showPage(current + 1);
    }
  }

  function prevPage() {
    if (current > 0) {
      showPage(current - 1);
    }
  }
</script>

</body>
</html>
