<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Колобок — книга</title>

<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  background: #efe9dd;
  font-family: "Georgia", serif;
  overflow: hidden;
}

/* КНИГА */
.book {
  width: 100vw;
  height: 100vh;
  display: flex;
  transition: transform 0.6s ease;
}

/* РАЗВОРОТ */
.spread {
  min-width: 100vw;
  height: 100vh;
  display: flex;
}

/* ТЕКСТ */
.text-page {
  width: 50%;
  background: #faf6ec;
  padding: 80px 70px;
  display: flex;
  align-items: center;
}

.text-page p {
  font-size: 22px;
  line-height: 1.6;
  color: #2e2b26;
  white-space: pre-line;
}

/* ИЛЛЮСТРАЦИЯ */
.image-page {
  width: 50%;
  background: #f3efe6;
  display: flex;
  align-items: center;
  justify-content: center;
}

.image-page img {
  width: 100%;
  height: 100%;
  object-fit: contain;
}

/* НАВИГАЦИЯ */
.nav {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(0,0,0,0.45);
  color: white;
  border: none;
  font-size: 28px;
  padding: 12px 18px;
  cursor: pointer;
  z-index: 10;
}

.nav.left { left: 10px; }
.nav.right { right: 10px; }

/* МОБИЛЬНАЯ АДАПТАЦИЯ */
@media (max-width: 768px) {
  .spread {
    flex-direction: column;
  }

  .text-page,
  .image-page {
    width: 100%;
    height: 50%;
    padding: 30px;
  }

  .text-page p {
    font-size: 18px;
  }
}
</style>
</head>

<body>

<button class="nav left" onclick="prev()">‹</button>
<button class="nav right" onclick="next()">›</button>

<div class="book" id="book">

  <!-- РАЗВОРОТ 1 -->
  <div class="spread">
    <div class="text-page">
      <p><strong>Колобок</strong>
Русская народная сказка</p>
    </div>
    <div class="image-page">
      <img src="img/01.jpg">
    </div>
  </div>

  <!-- РАЗВОРОТ 2 -->
  <div class="spread">
    <div class="text-page">
      <p>Жили-были дед да баба...</p>
    </div>
    <div class="image-page">
      <img src="img/02.jpg">
    </div>
  </div>

</div>

<script>
let page = 0;
const book = document.getElementById("book");
const total = document.querySelectorAll(".spread").length;

function update() {
  book.style.transform = `translateX(-${page * 100}vw)`;
}

function next() {
  if (page < total - 1) {
    page++;
    update();
  }
}

function prev() {
  if (page > 0) {
    page--;
    update();
  }
}
</script>

</body>
</html>
